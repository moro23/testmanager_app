# =============================================================================
# TEST DATASOURCE (H2 In-Memory)
# =============================================================================
# Overrides the production PostgreSQL datasource with an in-memory H2 database.
# DB_CLOSE_DELAY=-1 keeps the database alive for the lifetime of the JVM,
# preventing connection-pool errors across multiple test contexts.
# MODE=PostgreSQL enables H2's PostgreSQL compatibility layer.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# =============================================================================
# JPA / HIBERNATE
# =============================================================================
# 'create-drop' lets Hibernate manage the schema directly from entity metadata,
# removing the need for Flyway in the test context.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =============================================================================
# FLYWAY
# =============================================================================
# Disabled because H2 does not support all PostgreSQL-specific DDL in the migrations.
# Schema creation is delegated to Hibernate (ddl-auto=create-drop above).
spring.flyway.enabled=false

# =============================================================================
# JWT
# =============================================================================
# Dedicated test signing key — never share with non-test environments.
# Token lifetime in milliseconds (3600000 = 1 hour).
app.jwt.secret=dGVzdHNlY3JldGtleXRoYXRpc2F0bGVhc3QyNTZiaXRzbG9uZ2Zvcmhtyw==
app.jwt.expiration-ms=3600000
