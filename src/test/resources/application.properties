# ===========================================
# TEST CONFIGURATION
# ===========================================
# Tests use H2 in-memory database instead of PostgreSQL.
# Why? Tests should be fast, isolated, and not require Docker.
# MODE=PostgreSQL tells H2 to emulate PostgreSQL SQL syntax.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate auto-create tables for tests (no Flyway needed)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway in tests (H2 doesn't support all PostgreSQL syntax)
spring.flyway.enabled=false

# JWT config for tests
app.jwt.secret=dGVzdHNlY3JldGtleXRoYXRpc2F0bGVhc3QyNTZiaXRzbG9uZ2Zvcmhtyw==
app.jwt.expiration-ms=3600000