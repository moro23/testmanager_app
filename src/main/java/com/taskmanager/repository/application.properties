# ===========================================
# APPLICATION
# ===========================================
spring.application.name=task-manager-api
server.port=8080

# ===========================================
# DATABASE (PostgreSQL via Docker)
# ===========================================
# Spring Boot reads these and auto-creates a HikariCP connection pool.
# These values must match what's in docker-compose.yml.
spring.datasource.url=jdbc:postgresql://localhost:5433/taskmanager
spring.datasource.username=taskmanager
spring.datasource.password=taskmanager123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# JPA / HIBERNATE
# ===========================================
# ddl-auto options: none, validate, update, create, create-drop
# 'validate' = Hibernate checks entities match DB schema on startup
# NEVER use 'update' in production. We use Flyway for schema changes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================================
# FLYWAY (Database Migrations)
# ===========================================
# On startup, Flyway checks db/migration/ for SQL scripts and runs
# any that haven't been applied yet. It tracks state in a
# flyway_schema_history table it creates automatically.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===========================================
# JWT CONFIGURATION
# ===========================================
# Custom properties (not built into Spring - we read these in our code).
# The secret is a Base64-encoded key. In production, use env variables.
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiB0aGF0IGlzIGF0IGxlYXN0IDI1NiBiaXRz
app.jwt.expiration-ms=86400000

# ===========================================
# LOGGING
# ===========================================
logging.level.com.taskmanager=DEBUG
logging.level.org.springframework.security=DEBUG